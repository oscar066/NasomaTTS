# ─────────────────────────────────────────────────────────────────────────────
# Host-level nginx config for the Contabo server.
# Manages SSL termination and routing for all apps.
#
# Deploy to: /etc/nginx/sites-available/apps.conf
# Enable:    sudo ln -s /etc/nginx/sites-available/apps.conf /etc/nginx/sites-enabled/
# Test:      sudo nginx -t
# Reload:    sudo systemctl reload nginx
#
# Port map (127.0.0.1 only — not public):
#   Kiduka  client → 3000   api → 8000
#   NasomaTTS client → 3001  api → 8001
#
# SSL certs (Cloudflare Origin Certificates):
#   /etc/nginx/ssl/kiduka-origin.crt  /etc/nginx/ssl/kiduka-origin.key
#   /etc/nginx/ssl/nasoma-origin.crt  /etc/nginx/ssl/nasoma-origin.key
# ─────────────────────────────────────────────────────────────────────────────

# ── Kiduka ────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name kiduka-labs.co.ke www.kiduka-labs.co.ke;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kiduka-labs.co.ke www.kiduka-labs.co.ke;

    ssl_certificate     /etc/nginx/ssl/kiduka-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/kiduka-origin.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:KidukaSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # NextAuth internal routes → client
    location ~ ^/api/auth/(session|csrf|providers|callback|signin|signout|error|_log) {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API → FastAPI (strip /api prefix)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── NasomaTTS ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_NASOMA_DOMAIN www.YOUR_NASOMA_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_NASOMA_DOMAIN www.YOUR_NASOMA_DOMAIN;

    ssl_certificate     /etc/nginx/ssl/nasoma-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/nasoma-origin.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:NasomaSSL:10m;
