services:
  # Next.js Client — dev mode with HMR
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: deps          # stop after npm ci, skip the full production build
    container_name: nasoma_client_dev
    command: npm run dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - API_URL=http://nasoma_api_dev:8000
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_URL_INTERNAL=http://nasoma_client_dev:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./client:/app
      - /app/node_modules    # keep the container's installed node_modules intact
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nasoma-network
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src
        - action: sync
          path: ./client/public
          target: /app/public
        - action: rebuild
          path: ./client/package.json

  # FastAPI Backend — uvicorn with --reload
  api:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    container_name: nasoma_api_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://nasoma-mongo:27017}
      - MINIO_ENDPOINT=nasoma-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_DB=${MONGODB_DB}
      - REDIS_URL=redis://nasoma-redis:6379
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - KOKORO_URL=${KOKORO_URL}
    volumes:
      - ./backend/fastapi:/app
    ports:
      - "8001:8000"
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nasoma-network
    develop:
      watch:
        - action: sync
          path: ./backend/fastapi/app
          target: /app/app
        - action: rebuild
          path: ./backend/fastapi/requirements.txt

  # arq background worker — processes email jobs from the Redis queue
  worker:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    container_name: nasoma_worker_dev
    command: arq app.workers.settings.WorkerSettings
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://nasoma-mongo:27017}
      - MINIO_ENDPOINT=nasoma-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_DB=${MONGODB_DB}
      - REDIS_URL=redis://nasoma-redis:6379
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
    volumes:
      - ./backend/fastapi:/app
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - nasoma-network

  # MongoDB
  mongo:
    image: mongo:8
    container_name: nasoma_mongo_dev
    hostname: nasoma-mongo
    command: mongod --quiet
    volumes:
      - nasoma_mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - nasoma-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nasoma_redis_dev
    hostname: nasoma-redis
    volumes:
      - nasoma_redis_data:/data
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"          # exposed locally for inspection
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasoma-network

  # MinIO Object Storage
  minio:
    image: minio/minio
    container_name: nasoma_minio_dev
    hostname: nasoma-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - nasoma_minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"          # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasoma-network


networks:
  nasoma-network:
    driver: bridge

volumes:
  nasoma_mongo_data:
    driver: local
  nasoma_minio_data:
    driver: local
  nasoma_redis_data:
    driver: local
